apiVersion: apps/v1
kind: Deployment
metadata:
  name: auralyn-clinical-ai
  labels:
    app: auralyn-clinical-ai
    version: "1.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 2
  selector:
    matchLabels:
      app: auralyn-clinical-ai
  template:
    metadata:
      labels:
        app: auralyn-clinical-ai
    spec:
      containers:
        - name: app
          image: auralyn/clinical-ai:latest
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auralyn-secrets
                  key: database-url
            - name: DATABASE_URL_PRIMARY
              valueFrom:
                secretKeyRef:
                  name: auralyn-secrets
                  key: database-url-primary
                  optional: true
            - name: DATABASE_URL_REPLICA
              valueFrom:
                secretKeyRef:
                  name: auralyn-secrets
                  key: database-url-replica
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: auralyn-secrets
                  key: openai-api-key
            - name: REDIS_PRIMARY
              valueFrom:
                secretKeyRef:
                  name: auralyn-secrets
                  key: redis-primary
                  optional: true
            - name: REDIS_SECONDARY
              valueFrom:
                secretKeyRef:
                  name: auralyn-secrets
                  key: redis-secondary
                  optional: true
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: auralyn-secrets
                  key: redis-url
                  optional: true
            - name: PRIMARY_API_URL
              valueFrom:
                secretKeyRef:
                  name: auralyn-secrets
                  key: primary-api-url
                  optional: true
            - name: SECONDARY_API_URL
              valueFrom:
                secretKeyRef:
                  name: auralyn-secrets
                  key: secondary-api-url
                  optional: true
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auralyn-clinical-ai-svc
spec:
  selector:
    app: auralyn-clinical-ai
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
