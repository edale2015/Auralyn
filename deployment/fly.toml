app = "auralyn-ai"
primary_region = "ewr"

[build]
  dockerfile = "deployment/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "5000"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "performance-2x"
  memory = "4gb"

[mounts]
  source = "auralyn_data"
  destination = "/data"

[[services]]
  internal_port = 5000
  protocol = "tcp"
  auto_stop_machines = false

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
